<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DID-Nostr Resolver</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Add NostrTools library -->
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools/lib/nostr.bundle.min.js"></script>
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --secondary: #10b981;
        --secondary-dark: #059669;
        --danger: #ef4444;
        --danger-dark: #dc2626;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
        --border-radius: 12px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, sans-serif;
        line-height: 1.6;
        color: var(--gray-800);
        max-width: 900px;
        margin: 0 auto;
        padding: 30px 20px;
        background-color: #f9fafb;
      }

      h1,
      h2,
      h3 {
        color: var(--gray-900);
        font-weight: 700;
        line-height: 1.2;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: inline-block;
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        position: relative;
      }

      h2::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 0;
        width: 60px;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        border-radius: 2px;
      }

      h3 {
        font-size: 1.25rem;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }

      p {
        margin-bottom: 1rem;
        color: var(--gray-700);
      }

      .app-description {
        font-size: 1.1rem;
        color: var(--gray-700);
        margin-bottom: 2rem;
      }

      .container {
        background-color: white;
        border-radius: var(--border-radius);
        padding: 30px;
        box-shadow: var(--shadow);
        margin-top: 20px;
        border: 1px solid var(--gray-200);
        transition: all 0.3s ease;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--gray-800);
        font-size: 0.9rem;
      }

      input[type='text'],
      textarea {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--gray-300);
        border-radius: var(--border-radius);
        font-family: 'Consolas', monospace;
        font-size: 0.95rem;
        transition: all 0.2s ease;
        color: var(--gray-800);
        background-color: white;
      }

      input[type='text']:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }

      input[type='text']::placeholder {
        color: var(--gray-300);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 22px;
        border: none;
        border-radius: var(--border-radius);
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
        font-size: 0.95rem;
        gap: 8px;
      }

      button:focus {
        outline: none;
      }

      .primary-btn {
        background-color: var(--primary);
        color: white;
      }

      .primary-btn:hover {
        background-color: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .primary-btn:active {
        transform: translateY(0);
      }

      .tabs {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--gray-200);
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab {
        padding: 14px 24px;
        cursor: pointer;
        position: relative;
        user-select: none;
        color: var(--gray-700);
        font-weight: 600;
        white-space: nowrap;
        transition: all 0.2s ease;
      }

      .tab:hover {
        color: var(--primary);
      }

      .tab.active {
        color: var(--primary);
      }

      .tab.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: var(--primary);
        transition: all 0.3s ease;
      }

      .tab-content {
        display: none;
        animation: fadeIn 0.5s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .tab-content.active {
        display: block;
      }

      .result {
        margin-top: 25px;
        background-color: var(--gray-100);
        padding: 20px;
        border-radius: var(--border-radius);
        white-space: pre-wrap;
        font-family: 'Consolas', monospace;
        overflow-x: auto;
        border: 1px solid var(--gray-200);
        font-size: 0.9rem;
        position: relative;
        display: none;
      }

      .result.visible {
        display: block;
        animation: slideIn 0.3s ease-out forwards;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: var(--gray-200);
        color: var(--gray-800);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.8rem;
        opacity: 0.7;
        transition: all 0.2s ease;
      }

      .copy-btn:hover {
        opacity: 1;
        background-color: var(--gray-300);
      }

      .error {
        color: var(--danger);
        margin-top: 10px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .relays-container {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--gray-200);
      }

      .relay-input {
        display: flex;
        margin-bottom: 12px;
        align-items: center;
      }

      .relay-input input {
        flex-grow: 1;
        margin-right: 10px;
      }

      .add-relay {
        background-color: var(--primary);
        color: white;
        margin-top: 8px;
      }

      .add-relay:hover {
        background-color: var(--primary-dark);
      }

      .remove-relay {
        background-color: var(--danger);
        color: white;
        padding: 8px 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--border-radius);
        transition: all 0.2s ease;
      }

      .remove-relay:hover {
        background-color: var(--danger-dark);
      }

      .card {
        padding: 20px;
        border-radius: var(--border-radius);
        border: 1px solid var(--gray-200);
        background-color: white;
        margin-bottom: 20px;
        box-shadow: var(--shadow-sm);
        transition: box-shadow 0.3s ease;
      }

      .card:hover {
        box-shadow: var(--shadow);
      }

      code {
        background-color: var(--gray-100);
        padding: 3px 6px;
        border-radius: 4px;
        font-family: 'Consolas', monospace;
        font-size: 0.9em;
        color: var(--primary-dark);
      }

      pre {
        background-color: var(--gray-100);
        padding: 15px;
        border-radius: var(--border-radius);
        overflow-x: auto;
        margin: 15px 0;
        border: 1px solid var(--gray-200);
      }

      pre code {
        background-color: transparent;
        padding: 0;
        color: var(--gray-800);
      }

      ul {
        padding-left: 20px;
        margin-bottom: 20px;
      }

      li {
        margin-bottom: 8px;
        color: var(--gray-700);
      }

      strong {
        color: var(--gray-900);
      }

      .feature-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin: 25px 0;
      }

      .feature-card {
        padding: 20px;
        border-radius: var(--border-radius);
        border: 1px solid var(--gray-200);
        background-color: white;
        box-shadow: var(--shadow-sm);
        transition: all 0.3s ease;
      }

      .feature-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow);
      }

      .feature-icon {
        font-size: 1.5rem;
        margin-bottom: 15px;
        color: var(--primary);
        background-color: rgba(99, 102, 241, 0.1);
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
      }

      .feature-title {
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--gray-900);
      }

      .tooltip {
        position: relative;
        display: inline-block;
        margin-left: 5px;
        color: var(--gray-500);
        cursor: help;
      }

      .tooltiptext {
        visibility: hidden;
        width: 250px;
        background-color: var(--gray-800);
        color: white;
        text-align: center;
        border-radius: 6px;
        padding: 8px;
        position: absolute;
        z-index: 1;
        bottom: 125%;
        left: 50%;
        margin-left: -125px;
        opacity: 0;
        transition: opacity 0.3s;
        font-size: 0.85rem;
        pointer-events: none;
      }

      .tooltip:hover .tooltiptext {
        visibility: visible;
        opacity: 1;
      }

      .loading {
        display: none;
        margin: 20px 0;
        text-align: center;
      }

      .spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid rgba(99, 102, 241, 0.3);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 20px 15px;
        }

        .container {
          padding: 20px;
        }

        h1 {
          font-size: 2rem;
        }

        button {
          width: 100%;
        }

        .feature-grid {
          grid-template-columns: 1fr;
        }
      }

      .tab-container {
        margin-top: 1.5rem;
        flex-grow: 1;
        width: 100%;
      }

      .relay-actions {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
      }

      .fetch-relay {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 5px;
        border: 1px solid var(--border-color);
        background-color: var(--background-color);
        color: var(--text-color);
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .fetch-relay:hover:not(:disabled) {
        background-color: var(--accent-color);
        color: var(--background-color);
      }

      .fetch-relay:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .relay-fetch-error {
        margin-bottom: 10px;
        font-size: 14px;
      }
    </style>
    <!-- Preact HTM Standalone scripts -->
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <script src="https://unpkg.com/preact@10.11.3/dist/preact.umd.js"></script>
    <script src="https://unpkg.com/preact@10.11.3/hooks/dist/hooks.umd.js"></script>
    <!-- NostrTools library -->
    <script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      // Bundled version of the did-nostr-resolver library
      const didNostrResolver = (() => {
        function isValidNostrPubkey(pubkey) {
          return typeof pubkey === 'string' && /^[0-9a-f]{64}$/.test(pubkey)
        }

        function npubToHex(npub) {
          // This is a placeholder. In a real implementation,
          // you would need a Bech32 library to decode the npub
          if (
            typeof npub === 'string' &&
            npub.startsWith('npub1') &&
            npub.length >= 60
          ) {
            console.warn('Real npub conversion requires a Bech32 library')
            return null
          }
          return null
        }

        function createDidNostr(pubkey) {
          // Support for npub format (partial implementation)
          if (pubkey.startsWith('npub1')) {
            const hexPubkey = npubToHex(pubkey)
            if (!hexPubkey) {
              console.error('Invalid or unsupported npub format')
              return null
            }
            pubkey = hexPubkey
          }

          if (!isValidNostrPubkey(pubkey)) {
            console.error('Invalid Nostr public key format')
            return null
          }

          return `did:nostr:${pubkey}`
        }

        async function createDidNostrDocument(pubkey, options = {}) {
          // Support for npub format (partial implementation)
          if (pubkey.startsWith('npub1')) {
            const hexPubkey = npubToHex(pubkey)
            if (!hexPubkey) {
              console.error('Invalid or unsupported npub format')
              return null
            }
            pubkey = hexPubkey
          }

          if (!isValidNostrPubkey(pubkey)) {
            console.error('Invalid Nostr public key format')
            return null
          }

          const did = createDidNostr(pubkey)

          const didDocument = {
            '@context': [
              'https://www.w3.org/ns/did/v1',
              'https://w3id.org/nostr/context'
            ],
            id: did,
            verificationMethod: [
              {
                id: `${did}#key1`,
                controller: did,
                type: 'SchnorrVerification2023'
              }
            ],
            authentication: ['#key1'],
            assertionMethod: ['#key1']
          }

          // Add relay services if provided
          const services = []

          if (
            options.relays &&
            Array.isArray(options.relays) &&
            options.relays.length > 0
          ) {
            options.relays.forEach((relay, index) => {
              services.push({
                id: `${did}#relay${index + 1}`,
                type: 'Relay',
                serviceEndpoint: relay
              })
            })
          }

          // Add website from profile if available
          if (options.website) {
            services.push({
              id: `${did}#website`,
              type: ['Website', 'LinkedDomains'],
              serviceEndpoint: options.website
            })
          }

          // Only add services array if there are services
          if (services.length > 0) {
            didDocument.service = services
          }

          return didDocument
        }

        async function resolveDidNostr(did, options = {}) {
          if (!did || typeof did !== 'string') {
            console.error('Invalid DID provided')
            return null
          }

          // Check if the DID matches the expected format
          const didMatch = did.match(/^did:nostr:([0-9a-f]{64})$/)
          if (!didMatch) {
            console.error('Invalid DID-Nostr format')
            return null
          }

          const pubkey = didMatch[1]
          return createDidNostrDocument(pubkey, options)
        }

        return {
          isValidNostrPubkey,
          npubToHex,
          createDidNostr,
          createDidNostrDocument,
          resolveDidNostr
        }
      })()

      // Initialize NostrRelayScraper utility
      const nostrRelayScraper = {
        defaultRelays: [
          'wss://relay.damus.io',
          'wss://nos.lol',
          'wss://relay.nostr.band',
          'wss://nostr.bitcoiner.social'
        ],

        isValidPubkey(pubkey) {
          try {
            // Check if it's a hex pubkey
            if (/^[0-9a-f]{64}$/i.test(pubkey)) {
              return true
            }

            // Check if it's an npub and can be converted to hex
            if (pubkey.startsWith('npub1')) {
              try {
                return NostrTools.nip19.decode(pubkey).type === 'npub'
              } catch (e) {
                return false
              }
            }

            return false
          } catch (e) {
            return false
          }
        },

        normalizePublicKey(pubkey) {
          if (pubkey.startsWith('npub1')) {
            try {
              return NostrTools.nip19.decode(pubkey).data
            } catch (e) {
              throw new Error('Invalid npub format')
            }
          }
          return pubkey
        },

        async fetchRelaysForPubkey(pubkey) {
          if (!this.isValidPubkey(pubkey)) {
            throw new Error('Invalid public key format')
          }

          const hexPubkey = this.normalizePublicKey(pubkey)
          console.log('Fetching relay list for pubkey:', hexPubkey)

          // Create a filter for kind 10002 (relay list metadata) events
          const filter = {
            kinds: [10002],
            authors: [hexPubkey],
            limit: 1
          }

          // Remove HTTP fetch approach - only use WebSockets
          try {
            console.log('Using WebSocket approach to fetch relay list')

            // Function to get kind 10002 events via WebSocket
            const getViaWebSocket = relayUrl => {
              return new Promise(resolve => {
                try {
                  const ws = new WebSocket(relayUrl)
                  let timeoutId = setTimeout(() => {
                    console.log(`WebSocket timeout for ${relayUrl}`)
                    ws.close()
                    resolve(null)
                  }, 5000)

                  ws.onopen = () => {
                    console.log(`WebSocket connected to ${relayUrl}`)
                    const reqId = Math.random().toString(36).substring(7)
                    ws.send(JSON.stringify(['REQ', reqId, filter]))
                  }

                  ws.onmessage = event => {
                    try {
                      const data = JSON.parse(event.data)
                      if (
                        data[0] === 'EVENT' &&
                        data[2].kind === 10002 &&
                        data[2].pubkey === hexPubkey
                      ) {
                        console.log(`Got event from ${relayUrl}:`, data[2])
                        clearTimeout(timeoutId)
                        ws.close()
                        resolve(data[2])
                      } else if (data[0] === 'EOSE') {
                        console.log(`End of stored events from ${relayUrl}`)
                        clearTimeout(timeoutId)
                        ws.close()
                        resolve(null)
                      }
                    } catch (e) {
                      console.log(`Error parsing WebSocket message:`, e)
                    }
                  }

                  ws.onerror = () => {
                    console.log(`WebSocket error for ${relayUrl}`)
                    clearTimeout(timeoutId)
                    ws.close()
                    resolve(null)
                  }

                  ws.onclose = () => {
                    clearTimeout(timeoutId)
                    resolve(null)
                  }
                } catch (e) {
                  console.log(`Error creating WebSocket:`, e)
                  resolve(null)
                }
              })
            }

            // Create WebSocket promises for all default relays
            const fetchPromises = this.defaultRelays.map(relayUrl =>
              getViaWebSocket(relayUrl)
            )

            // Wait for all promises and collect results
            const results = await Promise.all(fetchPromises)
            const event = results.find(result => result !== null)

            if (event) {
              try {
                let relayUrls = []

                // Extract relays from tags array with 'r' prefix
                if (event.tags && Array.isArray(event.tags)) {
                  relayUrls = event.tags
                    .filter(tag => tag.length >= 2 && tag[0] === 'r')
                    .map(tag => tag[1])
                    .filter(
                      url =>
                        url &&
                        (url.startsWith('wss://') || url.startsWith('ws://'))
                    )
                }

                // Fall back to content parsing if tags didn't yield any results
                if (
                  relayUrls.length === 0 &&
                  event.content &&
                  event.content.trim() !== ''
                ) {
                  try {
                    const relayList = JSON.parse(event.content)
                    relayUrls = Object.keys(relayList)
                  } catch (e) {
                    console.log(
                      'Content not valid JSON, ignoring content field'
                    )
                  }
                }

                if (relayUrls && relayUrls.length > 0) {
                  console.log('Found relay list:', relayUrls)
                  return relayUrls
                } else {
                  console.log('No relay URLs found in event')
                }
              } catch (e) {
                console.log('Error extracting relay information:', e)
              }
            }

            // If we get here, no relays were found
            console.log('No relay list found')
            return []
          } catch (e) {
            console.error('Error in fetchRelaysForPubkey:', e)
            // Return empty array instead of throwing to avoid UI errors
            return []
          }
        },

        // New function to fetch profile information
        async fetchProfileForPubkey(pubkey) {
          if (!this.isValidPubkey(pubkey)) {
            throw new Error('Invalid public key format')
          }

          const hexPubkey = this.normalizePublicKey(pubkey)
          console.log('Fetching profile for pubkey:', hexPubkey)

          // Create a filter for kind 0 (profile metadata) events
          const filter = {
            kinds: [0],
            authors: [hexPubkey],
            limit: 1
          }

          try {
            console.log('Using WebSocket approach to fetch profile')

            // Function to get kind 0 events via WebSocket
            const getProfileViaWebSocket = relayUrl => {
              return new Promise(resolve => {
                try {
                  const ws = new WebSocket(relayUrl)
                  let timeoutId = setTimeout(() => {
                    console.log(
                      `WebSocket timeout for profile fetch from ${relayUrl}`
                    )
                    ws.close()
                    resolve(null)
                  }, 5000)

                  ws.onopen = () => {
                    console.log(
                      `WebSocket connected to ${relayUrl} for profile fetch`
                    )
                    const reqId = Math.random().toString(36).substring(7)
                    ws.send(JSON.stringify(['REQ', reqId, filter]))
                  }

                  ws.onmessage = event => {
                    try {
                      const data = JSON.parse(event.data)
                      if (
                        data[0] === 'EVENT' &&
                        data[2].kind === 0 &&
                        data[2].pubkey === hexPubkey
                      ) {
                        console.log(`Got profile from ${relayUrl}:`, data[2])
                        clearTimeout(timeoutId)
                        ws.close()
                        resolve(data[2])
                      } else if (data[0] === 'EOSE') {
                        console.log(
                          `End of stored profile events from ${relayUrl}`
                        )
                        clearTimeout(timeoutId)
                        ws.close()
                        resolve(null)
                      }
                    } catch (e) {
                      console.log(
                        `Error parsing WebSocket message for profile:`,
                        e
                      )
                    }
                  }

                  ws.onerror = () => {
                    console.log(
                      `WebSocket error for profile fetch from ${relayUrl}`
                    )
                    clearTimeout(timeoutId)
                    ws.close()
                    resolve(null)
                  }

                  ws.onclose = () => {
                    clearTimeout(timeoutId)
                    resolve(null)
                  }
                } catch (e) {
                  console.log(`Error creating WebSocket for profile fetch:`, e)
                  resolve(null)
                }
              })
            }

            // Create WebSocket promises for all default relays
            const fetchPromises = this.defaultRelays.map(relayUrl =>
              getProfileViaWebSocket(relayUrl)
            )

            // Wait for all promises and collect results
            const results = await Promise.all(fetchPromises)
            const profileEvent = results.find(result => result !== null)

            if (profileEvent && profileEvent.content) {
              try {
                const profileData = JSON.parse(profileEvent.content)
                console.log('Found profile data:', profileData)
                return profileData
              } catch (e) {
                console.log('Error parsing profile JSON:', e)
              }
            }

            // If we get here, no profile was found or it couldn't be parsed
            console.log('No valid profile found')
            return null
          } catch (e) {
            console.error('Error in fetchProfileForPubkey:', e)
            return null
          }
        },

        // Extract website from profile data
        getWebsiteFromProfile(profileData) {
          if (!profileData) return null

          // Check for website field
          if (
            profileData.website &&
            typeof profileData.website === 'string' &&
            profileData.website.trim() !== ''
          ) {
            let website = profileData.website.trim()

            // Ensure website starts with http:// or https://
            if (
              !website.startsWith('http://') &&
              !website.startsWith('https://')
            ) {
              website = 'https://' + website
            }

            console.log('Found website in profile:', website)
            return website
          }

          return null
        }
      }

      // Preact setup
      const { h, render, createContext } = preact
      const { useState, useEffect, useRef, useContext } = preactHooks
      const html = htm.bind(h)

      // Helper for animation timing
      const animationDelay = ms =>
        new Promise(resolve => setTimeout(resolve, ms))

      // Relay Input Component
      const RelayInput = ({ value, onRemove, onChange }) => {
        const [isVisible, setIsVisible] = useState(true)
        const relayRef = useRef(null)

        const handleRemove = async () => {
          setIsVisible(false)
          await animationDelay(300)
          onRemove()
        }

        useEffect(() => {
          if (relayRef.current) {
            relayRef.current.style.opacity = '0'
            relayRef.current.style.transform = 'translateY(10px)'

            setTimeout(() => {
              if (relayRef.current) {
                relayRef.current.style.transition = 'all 0.3s ease'
                relayRef.current.style.opacity = '1'
                relayRef.current.style.transform = 'translateY(0)'
              }
            }, 10)
          }
        }, [])

        const style = isVisible
          ? {}
          : {
              opacity: 0,
              transform: 'translateY(10px)'
            }

        return html`
          <div className="relay-input" ref=${relayRef} style=${style}>
            <input
              type="text"
              className="relay"
              placeholder="wss://relay.example.org"
              value=${value}
              onInput=${e => onChange(e.target.value)}
            />
            <button className="remove-relay" onClick=${handleRemove}>
              <i className="fas fa-times"></i>
            </button>
          </div>
        `
      }

      // Relay Container Component
      const RelayContainer = ({
        id,
        label,
        tooltip,
        initialRelays = [],
        onChange,
        pubkey = null
      }) => {
        const [relays, setRelays] = useState(
          initialRelays.length > 0
            ? initialRelays
            : ['wss://relay.damus.io', 'wss://nos.lol']
        )
        const [isFetching, setIsFetching] = useState(false)
        const [fetchError, setFetchError] = useState('')

        const addRelay = () => {
          const newRelays = [...relays, '']
          setRelays(newRelays)
          onChange(newRelays.filter(r => r.trim() !== ''))
        }

        const removeRelay = index => {
          const newRelays = relays.filter((_, i) => i !== index)
          setRelays(newRelays)
          onChange(newRelays.filter(r => r.trim() !== ''))
        }

        const updateRelay = (index, value) => {
          const newRelays = [...relays]
          newRelays[index] = value
          setRelays(newRelays)
          onChange(newRelays.filter(r => r.trim() !== ''))
        }

        const fetchRelaysFromNostr = async () => {
          if (!pubkey) {
            setFetchError('Please enter a valid public key first')
            setTimeout(() => setFetchError(''), 3000)
            return
          }

          setIsFetching(true)
          setFetchError('')

          try {
            const fetchedRelays = await nostrRelayScraper.fetchRelaysForPubkey(
              pubkey
            )

            if (fetchedRelays && fetchedRelays.length > 0) {
              setRelays(fetchedRelays)
              onChange(fetchedRelays)
            } else {
              setFetchError('No relays found for this pubkey')
              setTimeout(() => setFetchError(''), 3000)
            }
          } catch (error) {
            console.error('Error fetching relays:', error)
            setFetchError('Failed to fetch relays. Please try again.')
            setTimeout(() => setFetchError(''), 3000)
          } finally {
            setIsFetching(false)
          }
        }

        return html`
          <div className="relays-container" id=${id}>
            <label>
              ${label}
              <span className="tooltip">
                <i className="fas fa-question-circle"></i>
                <span className="tooltiptext">${tooltip}</span>
              </span>
            </label>

            <div className="relay-actions">
              <button className="add-relay" onClick=${addRelay}>
                <i className="fas fa-plus"></i> Add Relay
              </button>
              ${pubkey &&
              html`
                <button
                  className="fetch-relay"
                  onClick=${fetchRelaysFromNostr}
                  disabled=${isFetching}
                >
                  <i
                    className=${isFetching
                      ? 'fas fa-spinner fa-spin'
                      : 'fas fa-download'}
                  ></i>
                  ${isFetching ? 'Fetching...' : 'Fetch from Nostr'}
                </button>
              `}
            </div>

            ${fetchError &&
            html`
              <div className="error relay-fetch-error">
                <i className="fas fa-exclamation-circle"></i> ${fetchError}
              </div>
            `}

            <div id=${`${id}-inputs`}>
              ${relays.map(
                (relay, index) => html`
                  <${RelayInput}
                    key=${index}
                    value=${relay}
                    onRemove=${() => removeRelay(index)}
                    onChange=${value => updateRelay(index, value)}
                  />
                `
              )}
            </div>
          </div>
        `
      }

      // Result Component
      const Result = ({ id, isVisible, content }) => {
        const [copyText, setCopyText] = useState(
          '<i class="fas fa-copy"></i> Copy'
        )

        const handleCopy = () => {
          if (content) {
            navigator.clipboard.writeText(content)
            setCopyText('<i class="fas fa-check"></i> Copied!')
            setTimeout(() => {
              setCopyText('<i class="fas fa-copy"></i> Copy')
            }, 2000)
          }
        }

        return html`
          <div id=${id} className=${`result ${isVisible ? 'visible' : ''}`}>
            ${content}
            <button
              className="copy-btn"
              onClick=${handleCopy}
              dangerouslySetInnerHTML=${{ __html: copyText }}
            ></button>
          </div>
        `
      }

      // Loading Component
      const Loading = ({ id, message }) => {
        return html`
          <div id=${id} className="loading">
            <div className="spinner"></div>
            <p>${message}</p>
          </div>
        `
      }

      // Error Component
      const Error = ({ id, message }) => {
        if (!message) return null

        return html`
          <div id=${id} className="error">
            <i className="fas fa-exclamation-circle"></i> ${message}
          </div>
        `
      }

      // Create DID Tab Component
      const CreateDIDTab = () => {
        const [pubkey, setPubkey] = useState(
          '32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245'
        )
        const [relays, setRelays] = useState([
          'wss://relay.damus.io',
          'wss://nos.lol'
        ])
        const [isLoading, setIsLoading] = useState(false)
        const [error, setError] = useState('')
        const [result, setResult] = useState('')
        const [showResult, setShowResult] = useState(false)
        const [profileWebsite, setProfileWebsite] = useState(null)

        const handleCreate = async () => {
          setError('')
          setShowResult(false)
          setIsLoading(true)

          // Simulate loading for smoother UX
          await animationDelay(600)

          if (!pubkey) {
            setError('Please enter a Nostr public key')
            setIsLoading(false)
            return
          }

          if (!didNostrResolver.isValidNostrPubkey(pubkey)) {
            setError(
              'Invalid Nostr public key format. Must be a 64-character hex string.'
            )
            setIsLoading(false)
            return
          }

          // Try to fetch profile and extract website
          let website = null
          try {
            const profileData = await nostrRelayScraper.fetchProfileForPubkey(
              pubkey
            )
            console.log('Raw profile data:', profileData)
            website = nostrRelayScraper.getWebsiteFromProfile(profileData)
            console.log('Extracted website:', website)
            setProfileWebsite(website)
          } catch (e) {
            console.log('Error fetching profile:', e)
            // Continue even if profile fetch fails
          }

          const didDocument = await didNostrResolver.createDidNostrDocument(
            pubkey,
            {
              relays: relays.filter(r => r.trim() !== ''),
              website: website // Use the direct website value, not the state
            }
          )

          setIsLoading(false)
          setResult(JSON.stringify(didDocument, null, 2))
          setShowResult(true)
        }

        return html`
          <div>
            <h2>Create DID from Nostr Public Key</h2>
            <div className="form-group">
              <label for="pubkey">
                Nostr Public Key (64-character hex)
                <span className="tooltip">
                  <i className="fas fa-question-circle"></i>
                  <span className="tooltiptext"
                    >Enter your Nostr public key in hexadecimal format (64
                    characters)</span
                  >
                </span>
              </label>
              <input
                type="text"
                id="pubkey"
                placeholder="e.g., 32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245"
                value=${pubkey}
                onInput=${e => setPubkey(e.target.value)}
              />
            </div>

            <${RelayContainer}
              id="relay"
              label="Relays (optional)"
              tooltip="Add Nostr relays associated with this identifier"
              initialRelays=${relays}
              onChange=${setRelays}
              pubkey=${pubkey}
            />

            <div className="form-group">
              <button
                id="create-btn"
                className="primary-btn"
                onClick=${handleCreate}
              >
                <i className="fas fa-file-code"></i> Create DID Document
              </button>
            </div>

            <${Error} id="create-error" message=${error} />
            <${Loading}
              id="create-loading"
              message="Generating DID document..."
              style=${isLoading ? { display: 'block' } : { display: 'none' }}
            />
            <${Result}
              id="create-result"
              isVisible=${showResult}
              content=${result}
            />
          </div>
        `
      }

      // Resolve DID Tab Component
      const ResolveDIDTab = () => {
        const [did, setDid] = useState(
          'did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245'
        )
        const [relays, setRelays] = useState([
          'wss://relay.damus.io',
          'wss://nos.lol'
        ])
        const [isLoading, setIsLoading] = useState(false)
        const [error, setError] = useState('')
        const [result, setResult] = useState('')
        const [showResult, setShowResult] = useState(false)
        const [profileWebsite, setProfileWebsite] = useState(null)

        const handleResolve = async () => {
          setError('')
          setShowResult(false)
          setIsLoading(true)

          // Simulate loading for smoother UX
          await animationDelay(600)

          if (!did) {
            setError('Please enter a DID-Nostr identifier')
            setIsLoading(false)
            return
          }

          // Extract pubkey from DID
          const didMatch = did.match(/^did:nostr:([0-9a-f]{64})$/)
          if (!didMatch) {
            setError('Invalid DID-Nostr format')
            setIsLoading(false)
            return
          }

          const pubkey = didMatch[1]

          // Try to fetch profile and extract website
          let website = null
          try {
            const profileData = await nostrRelayScraper.fetchProfileForPubkey(
              pubkey
            )
            console.log('Raw profile data:', profileData)
            website = nostrRelayScraper.getWebsiteFromProfile(profileData)
            console.log('Extracted website:', website)
            setProfileWebsite(website)
          } catch (e) {
            console.log('Error fetching profile:', e)
            // Continue even if profile fetch fails
          }

          const didDocument = await didNostrResolver.resolveDidNostr(did, {
            relays: relays.filter(r => r.trim() !== ''),
            website: website // Use the direct website value, not the state
          })

          if (!didDocument) {
            setError('Invalid DID-Nostr format')
            setIsLoading(false)
            return
          }

          setIsLoading(false)
          setResult(JSON.stringify(didDocument, null, 2))
          setShowResult(true)
        }

        return html`
          <div>
            <h2>Resolve DID-Nostr</h2>
            <div className="form-group">
              <label for="did">
                DID-Nostr Identifier
                <span className="tooltip">
                  <i className="fas fa-question-circle"></i>
                  <span className="tooltiptext"
                    >Enter a DID in the format did:nostr:pubkey</span
                  >
                </span>
              </label>
              <input
                type="text"
                id="did"
                placeholder="e.g., did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245"
                value=${did}
                onInput=${e => setDid(e.target.value)}
              />
            </div>

            <${RelayContainer}
              id="resolve-relay"
              label="Relays (optional)"
              tooltip="Add Nostr relays to fetch data from"
              initialRelays=${relays}
              onChange=${setRelays}
              pubkey=${did.includes('did:nostr:')
                ? did.replace('did:nostr:', '')
                : null}
            />

            <div className="form-group">
              <button
                id="resolve-btn"
                className="primary-btn"
                onClick=${handleResolve}
              >
                <i className="fas fa-search"></i> Resolve DID
              </button>
            </div>

            <${Error} id="resolve-error" message=${error} />
            <${Loading}
              id="resolve-loading"
              message="Resolving DID document..."
              style=${isLoading ? { display: 'block' } : { display: 'none' }}
            />
            <${Result}
              id="resolve-result"
              isVisible=${showResult}
              content=${result}
            />
          </div>
        `
      }

      // About Tab Component
      const AboutTab = () => {
        return html`
          <div>
            <h2>About DID-Nostr</h2>
            <p>
              The Nostr DID method (<code>did:nostr</code>) enables
              decentralized identifiers on the Nostr network, providing a
              standardized way to reference Nostr public keys in the W3C DID
              ecosystem.
            </p>

            <div className="feature-grid">
              <div className="feature-card">
                <div className="feature-icon">
                  <i className="fas fa-key"></i>
                </div>
                <div className="feature-title">Schnorr Signatures</div>
                <p>
                  Uses the same cryptographic signature scheme as Nostr for
                  maximum compatibility
                </p>
              </div>

              <div className="feature-card">
                <div className="feature-icon">
                  <i className="fas fa-broadcast-tower"></i>
                </div>
                <div className="feature-title">Relay Declaration</div>
                <p>
                  Service fields allow declaring associated Nostr relays for
                  discovery
                </p>
              </div>

              <div className="feature-card">
                <div className="feature-icon">
                  <i className="fas fa-magic"></i>
                </div>
                <div className="feature-title">Simple Creation</div>
                <p>
                  Generate a key pair and encode the public key as a
                  64-character string
                </p>
              </div>

              <div className="feature-card">
                <div className="feature-icon">
                  <i className="fas fa-cogs"></i>
                </div>
                <div className="feature-title">Deterministic Resolution</div>
                <p>
                  DID documents can be deterministically generated from the
                  public key
                </p>
              </div>
            </div>

            <h3>DID Format</h3>
            <p>Nostr DIDs follow this format:</p>
            <pre><code>did:nostr:&lt;64-character-lowercase-public-key&gt;</code></pre>

            <h3>Example</h3>
            <pre><code>{
  "@context": ["https://w3id.org/did", "https://w3id.org/nostr/context"],
  "id": "did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245",
  "verificationMethod": [
    {
      "id": "did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245#key1",
      "controller": "did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245",
      "type": "SchnorrVerification2023"
    }
  ],
  "authentication": ["#key1"],
  "assertionMethod": ["#key1"],
  "service": [
    {
      "id": "did:nostr:32e1827635450ebb3c5a7d12c1f8e7b2b514439ac10a67eef3d9fd9c5c68e245#relay1",
      "type": "Relay",
      "serviceEndpoint": "wss://relay.example.org"
    }
  ]
}</code></pre>

            <h3>Relationship with Nostr npubs</h3>
            <p>
              In the Nostr ecosystem, public keys are often displayed as "npubs"
              (e.g., <code>npub1...</code>), which are Bech32 encoded versions
              of the raw public keys for human-friendly display. Nostr DIDs use
              the raw 64-character hexadecimal public key, not the npub format.
            </p>
          </div>
        `
      }

      // App Component
      const App = () => {
        const [activeTab, setActiveTab] = useState('create')
        const containerRef = useRef(null)

        // Tab switching with animation
        const switchTab = tabId => {
          setActiveTab(tabId)
        }

        // Entry animation for container
        useEffect(() => {
          if (containerRef.current) {
            containerRef.current.style.opacity = '0'
            containerRef.current.style.transform = 'translateY(20px)'

            setTimeout(() => {
              containerRef.current.style.transition = 'all 0.5s ease'
              containerRef.current.style.opacity = '1'
              containerRef.current.style.transform = 'translateY(0)'
            }, 100)
          }
        }, [])

        return html`
          <h1>DID-Nostr Resolver</h1>
          <p className="app-description">
            A powerful tool to create and resolve Decentralized Identifiers on
            the Nostr network
          </p>

          <div className="tabs">
            <div
              className=${`tab ${activeTab === 'create' ? 'active' : ''}`}
              onClick=${() => switchTab('create')}
            >
              <i className="fas fa-plus-circle"></i> Create DID
            </div>
            <div
              className=${`tab ${activeTab === 'resolve' ? 'active' : ''}`}
              onClick=${() => switchTab('resolve')}
            >
              <i className="fas fa-search"></i> Resolve DID
            </div>
            <div
              className=${`tab ${activeTab === 'about' ? 'active' : ''}`}
              onClick=${() => switchTab('about')}
            >
              <i className="fas fa-info-circle"></i> About
            </div>
          </div>

          <div className="container" ref=${containerRef}>
            <div
              className=${`tab-content ${
                activeTab === 'create' ? 'active' : ''
              }`}
              id="create"
            >
              ${activeTab === 'create' ? html`<${CreateDIDTab} />` : ''}
            </div>
            <div
              className=${`tab-content ${
                activeTab === 'resolve' ? 'active' : ''
              }`}
              id="resolve"
            >
              ${activeTab === 'resolve' ? html`<${ResolveDIDTab} />` : ''}
            </div>
            <div
              className=${`tab-content ${
                activeTab === 'about' ? 'active' : ''
              }`}
              id="about"
            >
              ${activeTab === 'about' ? html`<${AboutTab} />` : ''}
            </div>
          </div>
        `
      }

      // Render the app
      render(html`<${App} />`, document.getElementById('app'))
    </script>
  </body>
</html>
